<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">QA testing cover art</title>
  <desc id="desc">Dark 3D interface illustration for QA testing and bug reports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.6" stop-color="#171717"/>
      <stop offset="1" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1200" height="780" rx="56" fill="url(#bg)"/>
  <g stroke="#2d2d2d" stroke-width="2">
    <path d="M160 160h860M160 230h860M160 300h860M160 370h860M160 440h860M160 510h860M160 580h860"/>
    <path d="M220 100v580M330 100v580M440 100v580M550 100v580M660 100v580M770 100v580M880 100v580M990 100v580"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="210" y="170" width="560" height="360" rx="34" fill="url(#glass)" stroke="#7a7a7a"/>
    <rect x="280" y="245" width="420" height="44" rx="14" fill="#f2f2f2" opacity="0.9"/>
    <rect x="280" y="325" width="260" height="32" rx="12" fill="#747474"/>
    <rect x="280" y="390" width="330" height="32" rx="12" fill="#4c4c4c"/>
    <circle cx="694" cy="454" r="34" fill="#f6d47e"/>
    <path d="M678 454l13 13 27-36" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="715" y="270" width="250" height="250" rx="36" fill="#111" stroke="#555"/>
    <path d="M780 394h122M780 440h72" stroke="#f1f1f1" stroke-width="18" stroke-linecap="round"/>
    <circle cx="824" cy="340" r="42" fill="#222" stroke="#aaa"/>
  </g>
  <text x="210" y="650" fill="#f8f8f8" font-family="Georgia, serif" font-size="56" font-weight="700">QA Evidence</text>
  <text x="212" y="696" fill="#a8a8a8" font-family="Arial, sans-serif" font-size="24">Bug reports, reproduction steps, screenshots, and flow validation</text>
</svg>
