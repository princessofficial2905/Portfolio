<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">AI data cover art</title>
  <desc id="desc">Dark 3D cubes and scene mapping illustration for AI data projects.</desc>
